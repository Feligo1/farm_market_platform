<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login - FarmConnect Zambia</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2E8B57">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #2E8B57;
            --primary-dark: #1f6b43;
            --primary-light: #3CB371;
            --secondary: #FFA500;
            --danger: #dc3545;
            --success: #28a745;
            --info: #17a2b8;
            --bg-primary: #f5f7fb;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a5568;
            --border-color: #e2e8f0;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
        }

        body.dark-mode {
            --bg-primary: #0f0f1a;
            --bg-card: #16213e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --border-color: #2a2a4a;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); transition: all 0.3s ease; min-height: 100vh; overflow-x: hidden; }

        /* Dramatic Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInLeft { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 5px rgba(46,139,87,0.3); } 50% { box-shadow: 0 0 25px rgba(46,139,87,0.6); } }
        @keyframes slideInDown { from { opacity: 0; transform: translateY(-100%); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes borderPulse { 0%, 100% { border-color: var(--primary); } 50% { border-color: var(--primary-light); } }

        .animate-fadeUp { animation: fadeInUp 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
        .animate-fadeLeft { animation: fadeInLeft 0.8s ease forwards; }
        .animate-fadeRight { animation: fadeInRight 0.8s ease forwards; }
        .animate-scale { animation: scaleIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
        .animate-glow { animation: glow 2s ease-in-out infinite; }
        .animate-float { animation: float 3s ease-in-out infinite; }

        /* Header */
        .header { background: var(--bg-card); backdrop-filter: blur(10px); box-shadow: var(--shadow-sm); position: sticky; top: 0; z-index: 100; padding: 16px 32px; border-bottom: 1px solid var(--border-color); animation: slideInDown 0.5s ease; }
        .header-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 1.4rem; font-weight: 800; color: var(--primary); text-decoration: none; transition: all 0.3s ease; }
        .logo:hover { transform: scale(1.05) rotate(-2deg); text-shadow: 0 0 10px rgba(46,139,87,0.5); }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { text-decoration: none; color: var(--text-primary); font-weight: 500; transition: all 0.3s ease; padding: 8px 16px; border-radius: 12px; }
        .nav-links a:hover { background: rgba(46, 139, 87, 0.1); color: var(--primary); transform: translateY(-2px); }
        .dark-mode-toggle { background: none; border: 1px solid var(--border-color); border-radius: 50%; width: 40px; height: 40px; cursor: pointer; transition: all 0.3s ease; color: var(--text-primary); }
        .dark-mode-toggle:hover { background: var(--primary); color: white; transform: rotate(360deg) scale(1.1); }

        /* Main Content */
        .main-content { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 80px); padding: 40px 20px; }

        /* Hero Section (Background) */
        .hero-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .hero-bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.1; transition: opacity 1.5s ease; }
        body.dark-mode .hero-bg-image { opacity: 0.05; }

        /* Login Card */
        .login-card { background: var(--bg-card); border-radius: 32px; max-width: 450px; width: 100%; padding: 48px; box-shadow: var(--shadow-lg); animation: scaleIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); border: 1px solid var(--border-color); transition: all 0.3s ease; backdrop-filter: blur(10px); }
        .login-card:hover { transform: translateY(-5px); box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        .login-header { text-align: center; margin-bottom: 40px; }
        .login-icon { width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 2.2rem; color: white; transition: all 0.3s ease; animation: float 3s ease-in-out infinite; }
        .login-icon:hover { transform: scale(1.1) rotate(360deg); }
        .login-header h1 { font-size: 2rem; color: var(--primary); margin-bottom: 8px; }
        .login-header p { color: var(--text-secondary); font-size: 0.9rem; }

        /* Form Styles */
        .form-group { margin-bottom: 24px; position: relative; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; color: var(--text-primary); }
        .form-group input { width: 100%; padding: 14px 16px 14px 45px; border: 2px solid var(--border-color); border-radius: 14px; background: var(--bg-primary); color: var(--text-primary); font-size: 1rem; transition: all 0.3s ease; }
        .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(46, 139, 87, 0.2); transform: scale(1.02); }
        .form-group input:hover { border-color: var(--primary-light); }
        .form-group i { position: absolute; left: 16px; top: 42px; color: var(--text-secondary); font-size: 1.1rem; transition: all 0.3s ease; }
        .form-group input:focus + i { color: var(--primary); transform: scale(1.1); }

        /* Remember Me & Forgot Password */
        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
        .checkbox { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .checkbox input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }
        .checkbox span { font-size: 0.85rem; color: var(--text-secondary); }
        .forgot-link { color: var(--primary); text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: all 0.3s ease; }
        .forgot-link:hover { text-decoration: underline; transform: translateX(3px); }

        /* Login Button */
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; border-radius: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden; }
        .login-btn::before { content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-radius: 50%; background: rgba(255,255,255,0.3); transform: translate(-50%, -50%); transition: width 0.6s, height 0.6s; }
        .login-btn:hover::before { width: 300px; height: 300px; }
        .login-btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: var(--shadow-lg); }
        .login-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        /* Demo Credentials */
        .demo-credentials { background: rgba(46, 139, 87, 0.08); border-radius: 14px; padding: 16px; margin: 24px 0; text-align: center; border: 1px dashed var(--border-color); transition: all 0.3s ease; }
        .demo-credentials:hover { background: rgba(46, 139, 87, 0.15); transform: scale(1.02); }
        .demo-credentials p { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 8px; }
        .demo-credentials .demo-user { font-family: monospace; font-size: 0.9rem; font-weight: 600; color: var(--primary); }
        .demo-btn { background: none; border: 1px solid var(--primary); color: var(--primary); padding: 6px 12px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; transition: all 0.3s ease; margin-top: 8px; }
        .demo-btn:hover { background: var(--primary); color: white; transform: translateY(-2px); }

        /* Register Link */
        .register-link { text-align: center; margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--border-color); }
        .register-link a { color: var(--primary); text-decoration: none; font-weight: 600; transition: all 0.3s ease; }
        .register-link a:hover { text-decoration: underline; transform: translateX(5px); display: inline-block; }

        /* Toast */
        .toast { position: fixed; bottom: 30px; right: 30px; padding: 14px 24px; border-radius: 14px; z-index: 2000; animation: slideInRight 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 12px; backdrop-filter: blur(10px); font-weight: 500; }
        .toast.success { background: linear-gradient(135deg, #28a745, #1e7e34); color: white; }
        .toast.error { background: linear-gradient(135deg, #dc3545, #c82333); color: white; }
        .toast.info { background: linear-gradient(135deg, var(--info), #138496); color: white; }

        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; margin-right: 8px; }

        footer { background: var(--bg-card); color: var(--text-secondary); text-align: center; padding: 20px; border-top: 1px solid var(--border-color); font-size: 0.8rem; margin-top: auto; }

        @media (max-width: 768px) {
            .login-card { padding: 32px 24px; margin: 20px; }
            .header { padding: 12px 20px; }
            .nav-links { gap: 10px; }
            .nav-links a { padding: 6px 12px; font-size: 0.9rem; }
            .login-header h1 { font-size: 1.6rem; }
            .toast { left: 16px; right: 16px; bottom: 20px; }
        }
    </style>
</head>
<body>

    <!-- Background Effect -->
    <div class="hero-bg">
        <div class="hero-bg-image" style="background-image: url('https://images.unsplash.com/photo-1523348837708-15d4a6d7b8c6?w=1920&h=1080&fit=crop');"></div>
    </div>

    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo"><i class="fas fa-tractor"></i><span>FarmConnect</span></a>
            <div class="nav-links">
                <a href="index.html"><i class="fas fa-home"></i> Home</a>
                <a href="register.html"><i class="fas fa-user-plus"></i> Register</a>
            </div>
            <button class="dark-mode-toggle" id="darkModeBtn"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <div class="main-content">chat
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon"><i class="fas fa-sign-in-alt"></i></div>
                <h1>Welcome Back</h1>
                <p>Login to access market prices, forecasts, and more</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
                    <i class="fas fa-user"></i>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                    <i class="fas fa-lock"></i>
                </div>

                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link" id="forgotPassword"><i class="fas fa-question-circle"></i> Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
            </form>

            <div class="register-link">
                Don't have an account? <a href="register.html"><i class="fas fa-user-plus"></i> Create Account</a>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 FarmConnect - Mulungushi University | Daka Felix (202206453) | Supervisor: Mr. E Nyirenda</p>
    </footer>

    <script>
        const API_BASE = window.location.origin + '/api';

        function safeUserName(user, fallback) {
            return (user && (user.name || user.username)) || fallback || 'User';
        }

        function redirectAfterLogin(user) {
            window.location.href = user && user.role === 'admin' ? 'admin.html' : 'dashboard.html';
        }

        // ===== Show Toast Notification =====
        function showToast(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = document.createElement('i');
            icon.className = `fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}`;
            toast.append(icon, document.createTextNode(` ${message}`));
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // ===== Handle Login =====
        async function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            if (!username || !password) {
                showToast('Please enter username and password', 'error');
                return;
            }
            
            const loginBtn = document.getElementById('loginBtn');
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<div class="loading-spinner"></div> Logging in...';
            loginBtn.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json().catch(() => ({}));
                
                if (response.ok && data.success) {
                    // Store token and user data
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('userData', JSON.stringify(data.user));
                    
                    if (rememberMe) {
                        localStorage.setItem('rememberedUser', username);
                    } else {
                        localStorage.removeItem('rememberedUser');
                    }
                    
                    showToast(`Welcome back, ${safeUserName(data.user, username)}. Redirecting...`, 'success');
                    
                    // Redirect based on role
                    setTimeout(() => {
                        redirectAfterLogin(data.user);
                    }, 1500);
                } else {
                    showToast(data.error || 'Invalid username or password', 'error');
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (error) {
                console.error('Login error:', error);
                showToast('Network error. Please check your connection.', 'error');
            } finally {
                loginBtn.innerHTML = originalText;
                loginBtn.disabled = false;
            }
        }

        // ===== Demo Login =====
        function demoLogin(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
            showToast(`Logging in as ${username}...`, 'info');
            setTimeout(() => {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }, 300);
        }

        // ===== Check if already logged in =====
        function checkExistingSession() {
            const token = localStorage.getItem('authToken');
            const userData = localStorage.getItem('userData');
            const rememberedUser = localStorage.getItem('rememberedUser');
            
            if (token && userData) {
                try {
                    const user = JSON.parse(userData);
                    showToast(`Welcome back, ${safeUserName(user)}. Redirecting...`, 'success');
                    setTimeout(() => {
                        redirectAfterLogin(user);
                    }, 1500);
                    return true;
                } catch(e) {
                    localStorage.removeItem('authToken');
                    localStorage.removeItem('userData');
                }
            }
            
            if (rememberedUser) {
                document.getElementById('username').value = rememberedUser;
                document.getElementById('rememberMe').checked = true;
            }
            
            return false;
        }

        // ===== Forgot Password =====
        function handleForgotPassword(e) {
            e.preventDefault();
            showToast('Please contact support at support@farmconnect.zm to reset your password', 'info');
        }

        // ===== Dark Mode =====
        function initDarkMode() {
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
                const icon = document.querySelector('#darkModeBtn i');
                if (icon) icon.className = 'fas fa-sun';
            }
            document.getElementById('darkModeBtn').addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
                const icon = document.querySelector('#darkModeBtn i');
                if (icon) icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
            });
        }

        // ===== Add Enter Key Support =====
        function setupEnterKey() {
            const inputs = document.querySelectorAll('#username, #password');
            inputs.forEach(input => {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        document.getElementById('loginForm').dispatchEvent(new Event('submit'));
                    }
                });
            });
        }

        // ===== HCI: Network Status =====
        window.addEventListener('online', () => showToast('Back online.', 'success'));
        window.addEventListener('offline', () => showToast('No internet connection. Please check your network.', 'error'));

        // ===== Initialize =====
        document.addEventListener('DOMContentLoaded', () => {
            initDarkMode();
            setupEnterKey();
            
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('forgotPassword').addEventListener('click', handleForgotPassword);
            document.getElementById('demoAdminBtn')?.addEventListener('click', () => demoLogin('Felix', '5645'));
            document.getElementById('demoFarmerBtn')?.addEventListener('click', () => demoLogin('farmer1', 'farmer123'));
            
            checkExistingSession();
        });
    </script>
</body>
</html>
